<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create New Password</title>

    <link rel="stylesheet" href="new-password.css">
</head>
<body>

    <main>

        <!-- Header -->
        <header class="top-header">

            <button class="back-btn" id="backBtn">
                ←
            </button>

            <div class="logo">
                <img src="image/Logo.png" alt="logo">

                <h2>
                    Career<span>Map</span>
                </h2>
            </div>

        </header>

        <!-- Heading -->
        <section class="heading">

            <h1>
                Create new
                <span>password</span>
            </h1>

            <p>
                Make sure it’s strong and<br>
                something you’ll remember.
            </p>

        </section>
       

        <!-- Form -->
        <form id="passwordForm">

            <!-- New Password -->
            <label for="newPassword">
                New Password
            </label>

            <div class="input-box">

                <span class="input-icon">🔒</span>

                <input
                    type="password"
                    id="newPassword"
                    placeholder="Create a password"
                >

                <button
                    type="button"
                    class="show-password"
                    data-target="newPassword"
                >
                    ◉
                </button>

            </div>

            <!-- Strength -->
            <div class="strength-container">

                <div class="strength-bars">
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                </div>

                <p id="strengthText">
                    Weak
                </p>

            </div>

            <!-- Confirm Password -->
            <label for="confirmPassword">
                Confirm New Password
            </label>

            <div class="input-box">

                <span class="input-icon">🔒</span>

                <input
                    type="password"
                    id="confirmPassword"
                    placeholder="Confirm your password"
                >

                <button
                    type="button"
                    class="show-password"
                    data-target="confirmPassword"
                >
                    ◉
                </button>

            </div>

            <!-- Button -->
            <button
                type="submit"
                class="update-btn"
            >
                <span>Update Password</span>
                <strong>→</strong>
            </button>

        </form>

    </main>

    <script>
        const newPassword = document.getElementById("newPassword");
const confirmPassword = document.getElementById("confirmPassword");
const passwordForm = document.getElementById("passwordForm");
const strengthText = document.getElementById("strengthText");

const strengthBars = document.querySelectorAll(
    ".strength-bars span"
);

const backBtn = document.getElementById("backBtn");


// SHOW / HIDE PASSWORD
document.querySelectorAll(".show-password").forEach(button => {

    button.addEventListener("click", () => {

        const input = document.getElementById(
            button.dataset.target
        );

        if (input.type === "password") {
            input.type = "text";
            button.textContent = "◉";
        } else {
            input.type = "password";
            button.textContent = "◉";
        }

    });

});


// PASSWORD STRENGTH
newPassword.addEventListener("input", () => {

    const password = newPassword.value;

    let strength = 0;

    if (password.length >= 8) strength++;
    if (/[A-Z]/.test(password)) strength++;
    if (/[0-9]/.test(password)) strength++;
    if (/[^A-Za-z0-9]/.test(password)) strength++;

    strengthBars.forEach((bar, index) => {
        bar.classList.toggle(
            "active",
            index < strength
        );
    });

    if (strength <= 1) {
        strengthText.textContent = "Weak";
        strengthText.style.color = "#ff5c5c";
    } else if (strength <= 3) {
        strengthText.textContent = "Medium";
        strengthText.style.color = "#ffc107";
    } else {
        strengthText.textContent = "Strong";
        strengthText.style.color = "#36d5a2";
    }

});


// FORM SUBMIT
passwordForm.addEventListener("submit", (e) => {

    e.preventDefault();

    if (newPassword.value === "") {
        alert("Please enter a new password");
        return;
    }

    if (newPassword.value.length < 8) {
        alert("Password must be at least 8 characters");
        return;
    }

    if (newPassword.value !== confirmPassword.value) {
        alert("Passwords do not match");
        return;
    }

    window.location.href = "password-updated.html";

});


// BACK BUTTON
backBtn.addEventListener("click", () => {
    window.location.href = "forgot-password.html";
});
    </script>

</body>
</html>
