<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Forgot Password | CareerMap</title>

    <link rel="stylesheet" href="forgot-password.css">
</head>
<body>

    <main>

        <!-- HEADER -->
        <header class="page-header">

            <button class="back-button" id="backButton">
                ←
            </button>

            <img
                src="image/Logo.png"
                alt="CareerMap Logo"
                class="logo"
            >
        <h1 class="h1">Career <span>Map</span></h1>
        </header>


        <!-- CONTENT -->
        <section class="forgot-content">

            <h1>
                Forgot your<br>
                <span>password?</span>
            </h1>


            <p class="description">
                No worries! Enter your email<br>
                and we’ll send you a link to<br>
                reset your password.
            </p>

            <!-- EMAIL -->
            <div class="form-group">

                <label>Email Address</label>

                <div class="input-box">

                    <span class="input-icon">✉</span>

                    <input
                        type="email"
                        id="email"
                        placeholder="Enter your email address"
                    >

                </div>

            </div>


            <!-- CONTINUE -->
            <button class="continue-btn" id="continueButton">

                <span>Continue</span>

                <span class="arrow">→</span>

            </button>


            <!-- BACK TO LOGIN -->
            <button class="login-link" id="loginLink">

                <span>‹</span>

                <span>Back to Login</span>

            </button>

        </section>

    </main>

    <script>
        const backButton = document.querySelector("#backButton");

const loginLink = document.querySelector("#loginLink");

const continueButton = document.querySelector("#continueButton");

const emailInput = document.querySelector("#email");


// BACK BUTTON
backButton.addEventListener("click", () => {

    window.location.href = "login.html";

});


// BACK TO LOGIN
loginLink.addEventListener("click", () => {

    window.location.href = "login.html";

});


// CONTINUE
continueButton.addEventListener("click", () => {

    const email = emailInput.value.trim();


    if (!email) {

        alert("Please enter your email address.");

        return;
    }


    if (!email.includes("@")) {

        alert("Please enter a valid email address.");

        return;
    }


    alert("Reset link sent successfully!");

    window.location.href = "reset-password.html";

});
    </script>
</body>
</html>
