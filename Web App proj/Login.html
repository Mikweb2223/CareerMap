<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | CareerMap</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Login.css">
</head>

<body>

    <main >

        <!-- CONTENT -->
        <section class="login-content">

            <h1>
                Let’s continue
                <span>Your Journey.</span>
            </h1>


            <p class="description">
                Sign in to discover careers<br>
                that match your strengths<br>
                and interests.
            </p>


            <!-- EMAIL -->
            <div class="form-group">

                <label>Email Address</label>

                <div class="input-box">

                    <span class="email-icon">✉</span>

                    <input
                        type="email"
                        id="email"
                        placeholder="Enter your email address"
                    >

                </div>

            </div>


            <!-- PASSWORD -->
            <div class="password-heading">

                <label>Password</label>

                <a href="forgot-password.html">
                    Forgot password?
                </a>

            </div>


            <div class="input-box">

                <span class="lock-icon">♙</span>

                <input
                    type="password"
                    id="password"
                    placeholder="Enter your password"
                >

                <button
                    class="eye-btn"
                    id="eyeBtn"
                    type="button"
                >
                    ◉
                </button>

            </div>


            <!-- REMEMBER ME -->
            <div class="remember">

                <button
                    class="check-box active"
                    id="rememberBtn"
                    type="button"
                >
                    ✓
                </button>

                <span>Remember me</span>

            </div>
           /!-- Error-Message --!/
           <p id="errorMessage" class="error-message"></p>

            <!-- LOGIN BUTTON -->
            <button
                class="login-btn"
                id="loginBtn"
            >

                <span>Log In</span>

                <span class="arrow">→</span>

            </button>


            <!-- OR -->
            <p class="or-text">
                or continue with
            </p>


           <button class="google-btn">

            <img
            src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png">

            Google

        </button>


            <!-- CREATE ACCOUNT -->
            <p class="create-account">

                Don’t have an account?

                <a href="signup.html">
                    Create Account
                </a>

            </p>

        </section>

    </main>


    <script>
        const passwordInput =
    document.getElementById("password");

const eyeBtn =
    document.getElementById("eyeBtn");

const rememberBtn =
    document.getElementById("rememberBtn");

const loginBtn =
    document.getElementById("loginBtn");



// SHOW / HIDE PASSWORD
eyeBtn.addEventListener("click", () => {

    if (passwordInput.type === "password") {

        passwordInput.type = "text";

        eyeBtn.textContent = "◉";

    } else {

        passwordInput.type = "password";

        eyeBtn.textContent = "◉";

    }

});


// REMEMBER ME
rememberBtn.addEventListener("click", () => {

    rememberBtn.classList.toggle("active");

    if (rememberBtn.classList.contains("active")) {

        rememberBtn.textContent = "✓";

    } else {

        rememberBtn.textContent = "";

    }

});

        loginForm.addEventListener("submit", function (e) {

    e.preventDefault();

    const passwordValue = password.value;

    // Example correct password
    const correctPassword = "12345678";

    // Remove previous error
    passwordBox.classList.remove("error");
    errorMessage.classList.remove("show");

    if (passwordValue !== correctPassword) {

        // Show red border
        passwordBox.classList.add("error");

        // Show error message
        errorMessage.textContent = "Incorrect password. Please try again.";
        errorMessage.classList.add("show");

        return;
    }
    
// Login successful
    window.location.href = "dashboard.html";

});

// LOGIN
loginBtn.addEventListener("click", () => {

    const email =
        document.getElementById("email").value.trim();

    const password =
        document.getElementById("password").value.trim();


    if (!email || !password) {

        alert("Please enter your email and password.");

        return;

    }


    alert("Login successful!");

 
});


const googleBtn = document.querySelector(".google-btn");

googleBtn.addEventListener("click", function (e) {

    e.preventDefault();

    const ripple = document.createElement("span");

    ripple.classList.add("ripple");

    ripple.style.left = `${e.offsetX}px`;
    ripple.style.top = `${e.offsetY}px`;

    this.appendChild(ripple);

    setTimeout(() => {
        ripple.remove();
    
 
    // Opens Google's sign-in page
        window.open("https://accounts.google.com/signin", "_blank");
    }, 600);
});
        
    </script>

</body>

</html>
